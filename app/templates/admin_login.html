<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet"
          href="../static/css/admin.css">
</head>
<body>
<main class="auth-page">
    <section class="auth-card">
        <h1>Вход администратора</h1>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Логин</label>
                <input
                    type="text"
                    id="login"
                    required
                >
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input
                    type="password"
                    id="password"
                    required
                >
            </div>
            <button
                type="submit"
                class="btn-primary"
            >
                Войти
            </button>
        </form>
    </section>
</main>
<script type="module"
        src="../static/js/admin/adminLogin.js">
</script>
</body>
</html>
